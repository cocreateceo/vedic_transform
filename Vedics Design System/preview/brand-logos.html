<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="label" style="margin-bottom:14px;">Product logos (3 platforms)</div>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;align-items:end;">
  <div style="background:linear-gradient(160deg,#1a0e05,#261408,#1a0e05);border-radius:16px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:10px;border:1px solid var(--dark-border);">
    <img src="../assets/10x-logo.jpg" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid rgba(198,153,62,0.4);">
    <div style="font-family:var(--font-heading);font-size:11px;color:var(--saffron-light);letter-spacing:0.15em;text-transform:uppercase;text-align:center;">10X Transform</div>
  </div>
  <div style="background:linear-gradient(160deg,#08101a,#141f10,#08101a);border-radius:16px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:10px;border:1px solid var(--dark-border);">
    <img src="../assets/astro-logo.png" style="width:104px;height:104px;object-fit:contain;filter:drop-shadow(0 8px 30px rgba(0,0,0,0.4));">
    <div style="font-family:var(--font-heading);font-size:11px;color:var(--c-astro-2);letter-spacing:0.15em;text-transform:uppercase;text-align:center;">Astro Vedics</div>
  </div>
  <div style="background:linear-gradient(160deg,#081a0e,#0f2614,#081a0e);border-radius:16px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:10px;border:1px solid var(--dark-border);">
    <span style="font-size:64px;">🌿</span>
    <div style="font-family:var(--font-heading);font-size:11px;color:var(--c-wellness-2);letter-spacing:0.15em;text-transform:uppercase;text-align:center;">AyurVeda Living</div>
  </div>
</div>
<div class="label" style="margin-top:14px;">Logos sit in product-tinted radial gradient backgrounds. Note: 10X logo is magenta-pink — chromatic mismatch with the saffron brand (flagged).</div>
</body></html>
